<h2 class="title">Invoices</h2>

<div class="invoice-toolbar">
  <div class="search-box">
    <svg
      class="search-icon-svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#9ca3af"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="8" />
      <line x1="21" y1="21" x2="16.65" y2="16.65" />
    </svg>
    <input
      type="text"
      placeholder="Search invoices..."
      (keyup)="applyFilter($event)"
    />
  </div>

  <div class="date-filter">
    <input type="date" [(ngModel)]="startDate" />
    <input type="date" [(ngModel)]="endDate" />
    <button class="export-btn" (click)="exportByDate()">Export Range</button>
  </div>
</div>

<div class="invoice-table-card">
  <div class="table-scroll">
    <table mat-table [dataSource]="dataSource" matSort>
      <!-- ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>#</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <!-- Invoice -->
      <ng-container matColumnDef="invoice_number">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Invoice</th>
        <td mat-cell *matCellDef="let element">
          {{ element.invoice_number }}
        </td>
      </ng-container>

      <!-- Total -->
      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
        <td mat-cell *matCellDef="let element">₹{{ element.final_total }}</td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let element">
          <span
            class="badge"
            [ngClass]="{
              cancelled: element.status === 'cancelled',
              paid:
                element.payment_status === 'paid' &&
                element.status !== 'cancelled',
              pending:
                element.payment_status === 'pending' &&
                element.status !== 'cancelled',
            }"
          >
            {{
              element.status === "cancelled"
                ? "Cancelled"
                : element.payment_status
            }}
          </span>
        </td>
      </ng-container>

      <!-- Payment -->
      <ng-container matColumnDef="payment_mode">
        <th mat-header-cell *matHeaderCellDef>Payment</th>
        <td mat-cell *matCellDef="let element">
          {{ element.payment_mode }}
        </td>
      </ng-container>

      <!-- Date -->
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
        <td mat-cell *matCellDef="let element">
          {{ element.created_at | date: "dd MMM yyyy" }}
        </td>
      </ng-container>

      <!-- Action -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let element">
          <button class="download-btn" (click)="downloadInvoice(element.id)">
            ⬇
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <!-- SAME PAGINATOR STYLE AS PRODUCTS -->
  <div class="table-footer">
    <mat-paginator
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      showFirstLastButtons
    >
    </mat-paginator>
  </div>
</div>
