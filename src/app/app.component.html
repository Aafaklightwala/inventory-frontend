<div class="app-container">
  <header class="premium-header" *ngIf="loggedIn">
    <div class="brand">Total<span>Karo</span></div>

    <div class="nav-wrapper">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <mat-icon>dashboard</mat-icon><span>Dashboard</span>
      </a>
      <a routerLink="/products" routerLinkActive="active" class="nav-item">
        <mat-icon>inventory_2</mat-icon><span>Products</span>
      </a>
      <a routerLink="/billing" routerLinkActive="active" class="nav-item">
        <mat-icon>point_of_sale</mat-icon><span>Billing</span>
      </a>
      <a routerLink="/invoices" routerLinkActive="active" class="nav-item">
        <mat-icon>receipt_long</mat-icon><span>Invoices</span>
      </a>
    </div>

    <div class="user-section">
      <button class="user-trigger" [matMenuTriggerFor]="userMenu">
        <div class="user-avatar"><mat-icon>person</mat-icon></div>
        <mat-icon class="caret-icon">keyboard_arrow_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" class="user-dropdown" xPosition="before">
        <div class="menu-header" (click)="$event.stopPropagation()">
          <div class="menu-avatar"><mat-icon>person</mat-icon></div>
          <div class="menu-user-info">
            <span class="menu-user-name">{{ userName || "My Account" }}</span>
            <span class="menu-user-role">{{
              userEmail || "TotalKaro User"
            }}</span>
          </div>
        </div>
        <div class="menu-divider"></div>
        <button mat-menu-item class="menu-item-logout" (click)="logout()">
          <div class="logout-chip"><mat-icon>logout</mat-icon></div>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </header>

  <div class="page-content">
    <router-outlet></router-outlet>
  </div>
</div>
